<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1A1410"/>
  <rect x="40" y="40" width="432" height="432" rx="72" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A0E1A"/>
      <stop offset="100%" stop-color="#6B1D2A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5A3"/>
      <stop offset="100%" stop-color="#C5A55A"/>
    </linearGradient>
  </defs>
  <!-- Orthodox cross (three horizontal bars) -->
  <!-- Vertical bar -->
  <rect x="240" y="100" width="32" height="312" rx="4" fill="url(#gold)"/>
  <!-- Top small bar -->
  <rect x="210" y="140" width="92" height="20" rx="3" fill="url(#gold)"/>
  <!-- Main bar -->
  <rect x="180" y="200" width="152" height="24" rx="4" fill="url(#gold)"/>
  <!-- Bottom angled bar -->
  <rect x="196" y="310" width="120" height="18" rx="3" fill="url(#gold)" transform="rotate(-15 256 319)"/>
  <!-- Gold circle glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#C5A55A" stroke-width="2" opacity="0.2"/>
</svg>
